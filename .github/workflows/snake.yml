name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: VivianNorum
          outputs: |
            images/github-snake.svg
            images/github-snake-dark.svg?palette=github-dark

      - name: Commit and push generated snake
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate snake animation
          file_pattern: images/github-snake*.svg
